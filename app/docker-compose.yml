version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: citadel-postgres
    environment:
      POSTGRES_USER: citadel
      POSTGRES_PASSWORD: citadel
      POSTGRES_DB: citadel_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citadel -d citadel_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
